<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataOps Agent 数据标采交付平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">DA</div>
        <div>
          <strong>DataOps Agent</strong>
          <span>数据标采交付平台</span>
        </div>
      </div>

      <section class="role-switch" aria-label="角色切换">
        <button class="role-btn active" data-role="customer">用户端</button>
        <button class="role-btn" data-role="operator">运营端</button>
        <button class="role-btn" data-role="vendor">供应商端</button>
        <button class="role-btn" data-role="quality">质检端</button>
        <button class="role-btn" data-role="manager">管理端</button>
      </section>

      <nav id="nav" class="nav" aria-label="主导航"></nav>

      <div class="sidebar-footer">
        <button id="exportBtn" class="plain-btn">导出数据</button>
        <button id="resetBtn" class="plain-btn danger">重置样例</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div id="roleLabel" class="eyebrow">用户端</div>
          <h1 id="pageTitle">工作台</h1>
        </div>
        <div class="top-actions">
          <span id="dataScope" class="scope-pill">组织视角：示例组织 A</span>
          <button id="saveBtn" class="dark-btn">保存当前数据</button>
        </div>
      </header>

      <section id="content" class="content" aria-live="polite"></section>
    </main>

    <aside class="agent-panel">
      <header class="agent-header">
        <div>
          <div class="eyebrow">Agent</div>
          <h2>流程助手</h2>
        </div>
        <span class="status">本地可用</span>
      </header>
      <section id="agentFeed" class="agent-feed"></section>
      <footer class="agent-composer">
        <textarea id="agentInput" rows="3" placeholder="例如：帮我创建一个图像标注需求，或者查看当前延期风险"></textarea>
        <button id="agentSend" class="dark-btn">发送</button>
      </footer>
    </aside>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
